<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Je donne - Le Petit Village de Trég'Union</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #fdf6ed 0%, #f5e6d3 100%);
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      padding: 20px;
    }
    .header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 30px; flex-wrap: wrap;
    }
    .logo img { width: 80px; height: auto; }
    .header h1 { font-size: 32px; font-weight: 700; color: #8B2E00; }
    .retour {
      margin-left: auto;
      background: rgba(139,46,0,0.1);
      border: none; border-radius: 12px;
      padding: 10px 20px; font-family: 'Cormorant Garamond', serif;
      font-size: 18px; color: #8B2E00; cursor: pointer;
      text-decoration: none;
    }
    .retour:hover { background: rgba(139,46,0,0.2); }
    .container { max-width: 700px; margin: 0 auto; }

    /* FORMULAIRE */
    .form-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px; padding: 30px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .form-card h2 { font-size: 26px; color: #1b4332; margin-bottom: 20px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 18px; font-weight: 600;
      color: #2d6a4f; margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 14px 16px;
      border: 2px solid #e8d0b5; border-radius: 12px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; color: #3a2010;
      background: rgba(253,246,237,0.9);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #2d6a4f; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .btn-publier {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #8B2E00, #6b2300);
      color: #FFF3DC; border: none; border-radius: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 700; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(139,46,0,0.3);
    }
    .btn-publier:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139,46,0,0.4); }

    /* ANNONCES */
    .annonces-titre {
      font-size: 26px; font-weight: 700; color: #1b4332;
      margin-bottom: 20px; padding-bottom: 10px;
      border-bottom: 2px solid #e8d0b5;
    }
    .annonce-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px; padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }
    .annonce-prenom { font-size: 22px; font-weight: 700; color: #2d6a4f; }
    .annonce-date { font-size: 14px; color: #9b7b5a; margin-left: 10px; }
    .annonce-badge {
      display: inline-block;
      background: rgba(245,200,66,0.2);
      color: #8B2E00; border: 1px solid rgba(245,200,66,0.5);
      border-radius: 20px; padding: 3px 14px;
      font-size: 14px; font-weight: 700;
      margin: 8px 0;
    }
    .annonce-quoi { font-size: 22px; font-weight: 600; color: #3a2010; margin: 8px 0 6px; }
    .annonce-desc { font-size: 17px; color: #6b4c35; margin-bottom: 14px; }

    /* RÉPONSES */
    .reponses-zone { border-top: 1px solid #e8d0b5; padding-top: 14px; margin-top: 14px; }
    .reponse-item {
      background: rgba(245,230,211,0.6);
      border-radius: 12px; padding: 10px 14px;
      margin-bottom: 8px; font-size: 17px;
    }
    .reponse-item strong { color: #2d6a4f; }
    .btn-interesse {
      background: none; border: 2px solid #F5C842;
      border-radius: 12px; padding: 12px 24px;
      color: #8B2E00; font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .btn-interesse:hover { background: rgba(245,200,66,0.15); transform: translateY(-1px); }

    /* FORM RÉPONSE */
    .form-reponse {
      display: none; margin-top: 12px;
      background: rgba(253,246,237,0.9);
      border: 1.5px solid #e8d0b5;
      border-radius: 12px; padding: 16px;
    }
    .form-reponse.visible { display: block; }
    .form-reponse input,
    .form-reponse textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e8d0b5; border-radius: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; color: #3a2010;
      background: white; margin-bottom: 10px; outline: none;
    }
    .form-reponse textarea { min-height: 70px; resize: vertical; }
    .btn-envoyer {
      background: linear-gradient(135deg, #2d6a4f, #1b4332);
      color: white; border: none; border-radius: 10px;
      padding: 12px 24px; font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 700; cursor: pointer;
    }
    .btn-envoyer:hover { opacity: 0.9; }

    .vide { font-size: 18px; color: #9b7b5a; font-style: italic; padding: 20px 0; }
    .toast {
      display: none; position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: #1b4332; color: white;
      padding: 14px 28px; border-radius: 40px;
      font-size: 18px; font-weight: 700;
      box-shadow: 0 6px 28px rgba(27,67,50,0.4);
      z-index: 999;
    }
    .toast.visible { display: block; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo"><img src="logo.png" alt="Logo Trég'Union"></div>
      <h1>🎁 Je donne</h1>
      <a href="index.html" class="retour">← Retour</a>
    </div>

    <!-- FORMULAIRE -->
    <div class="form-card">
      <h2>Publier une annonce de don</h2>
      <div class="form-group">
        <label>Votre prénom</label>
        <input type="text" id="d-prenom" placeholder="Ex : Marie">
      </div>
      <div class="form-group">
        <label>Qu'est-ce que vous donnez ?</label>
        <input type="text" id="d-quoi" placeholder="Ex : Vaisselle en porcelaine">
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <select id="d-cat">
          <option value="">— Choisissez —</option>
          <option>🏺 Bibelot / Déco</option>
          <option>🥫 Nourriture</option>
          <option>👕 Vêtements</option>
          <option>📚 Livres</option>
          <option>🎲 Jeux / Jouets</option>
          <option>🔧 Outils / Bricolage</option>
          <option>🌿 Jardin / Plantes</option>
          <option>🏠 Meubles</option>
          <option>💻 Électronique</option>
          <option>📦 Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description (optionnelle)</label>
        <textarea id="d-desc" placeholder="État, dimensions, précisions utiles…"></textarea>
      </div>
      <div class="form-group">
        <label>Votre email (pour être prévenu des réponses)</label>
        <input type="email" id="d-email" placeholder="votre@email.fr">
      </div>
      <button class="btn-publier" onclick="publierDon()">✓ Publier mon annonce</button>
    </div>

    <!-- LISTE DES ANNONCES -->
    <div class="annonces-titre">Les dons disponibles</div>
    <div id="liste-dons"><p class="vide">Aucune annonce pour le moment. Soyez le premier !</p></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'https://tregunion-worker.brunoduboy.workers.dev';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 3500);
    }

    function dateStr(d) {
      return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // CHARGER LES ANNONCES
    async function chargerDons() {
      try {
        const r = await fetch(API + '/api/annonces?type=don');
        const annonces = await r.json();
        const cont = document.getElementById('liste-dons');
        if (!annonces.length) {
          cont.innerHTML = '<p class="vide">Aucune annonce pour le moment. Soyez le premier !</p>';
          return;
        }
        cont.innerHTML = annonces.map(a => renderAnnonce(a)).join('');
      } catch(e) {
        console.error(e);
      }
    }

    function renderAnnonce(a) {
      return `<div class="annonce-card" id="annonce-${a.id}">
        <div>
          <span class="annonce-prenom">${escHtml(a.prenom)}</span>
          <span class="annonce-date">${dateStr(a.date)}</span>
        </div>
        <div class="annonce-badge">${escHtml(a.categorie)}</div>
        <div class="annonce-quoi">${escHtml(a.quoi)}</div>
        ${a.description ? `<div class="annonce-desc">${escHtml(a.description)}</div>` : ''}
        <div class="reponses-zone" id="rep-${a.id}"></div>
        <button class="btn-interesse" onclick="toggleReponse('${a.id}')">✋ Je suis intéressé(e) !</button>
        <div class="form-reponse" id="fr-${a.id}">
          <input type="text" id="fpr-prenom-${a.id}" placeholder="Votre prénom">
          <textarea id="fpr-msg-${a.id}" placeholder="Votre message…"></textarea>
          <button class="btn-envoyer" onclick="envoyerReponse('${a.id}')">Envoyer ma réponse</button>
        </div>
      </div>`;
    }

    // CHARGER LES RÉPONSES
    async function chargerReponses(annonce_id) {
      try {
        const r = await fetch(API + '/api/reponses?annonce_id=' + annonce_id);
        const reps = await r.json();
        const cont = document.getElementById('rep-' + annonce_id);
        if (!cont) return;
        if (!reps.length) { cont.innerHTML = ''; return; }
        cont.innerHTML = `<div style="font-size:15px;font-weight:700;color:#9b7b5a;margin-bottom:8px;">💬 ${reps.length} réponse(s) :</div>` +
          reps.map(r => `<div class="reponse-item"><strong>${escHtml(r.prenom)}</strong> : ${escHtml(r.message)}</div>`).join('');
      } catch(e) {}
    }

    function toggleReponse(id) {
      document.getElementById('fr-' + id).classList.toggle('visible');
    }

    // PUBLIER UN DON
    async function publierDon() {
      const prenom = document.getElementById('d-prenom').value.trim();
      const quoi = document.getElementById('d-quoi').value.trim();
      const categorie = document.getElementById('d-cat').value;
      const description = document.getElementById('d-desc').value.trim();
      const email = document.getElementById('d-email').value.trim();
      if (!prenom || !quoi || !categorie || !email) {
        showToast('⚠️ Merci de remplir tous les champs obligatoires.'); return;
      }
      try {
        const r = await fetch(API + '/api/annonces', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'don', prenom, quoi, categorie, description, email })
        });
        const data = await r.json();
        if (data.success) {
          ['d-prenom','d-quoi','d-desc','d-email'].forEach(id => document.getElementById(id).value = '');
          document.getElementById('d-cat').value = '';
          showToast('🎁 Votre annonce a bien été publiée !');
          chargerDons();
        }
      } catch(e) {
        showToast('❌ Une erreur est survenue, réessayez.');
      }
    }

    // ENVOYER UNE RÉPONSE
    async function envoyerReponse(annonce_id) {
      const prenom = document.getElementById('fpr-prenom-' + annonce_id).value.trim();
      const message = document.getElementById('fpr-msg-' + annonce_id).value.trim();
      if (!prenom || !message) {
        showToast('⚠️ Merci d\'entrer votre prénom et votre message.'); return;
      }
      try {
        const r = await fetch(API + '/api/reponses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ annonce_id, prenom, message })
        });
        const data = await r.json();
        if (data.success) {
          document.getElementById('fpr-prenom-' + annonce_id).value = '';
          document.getElementById('fpr-msg-' + annonce_id).value = '';
          document.getElementById('fr-' + annonce_id).classList.remove('visible');
          chargerReponses(annonce_id);
          showToast('✅ Votre réponse a été envoyée !');
        }
      } catch(e) {
        showToast('❌ Une erreur est survenue, réessayez.');
      }
    }

    // INIT
    chargerDons();
  </script>

</body>
</html>
