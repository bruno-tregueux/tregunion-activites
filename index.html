<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrégUnion Activités</title>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    .banniere-verte { 
      background: #28a745; color: white; padding: 15px; 
      text-align: center; cursor: pointer; margin: 20px 0;
    }
    section { margin: 40px 0; padding: 20px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <!-- TA PAGE ACTUELLE ICI -->
  
  <!-- AVANT </body> : SCRIPT COMPLET -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Scroll fluide TOUS liens #ancre
    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const target = document.querySelector(link.getAttribute('href'));
        if(target) target.scrollIntoView({behavior: 'smooth', block: 'start'});
      });
    });
    
    // Bannière verte
    document.querySelectorAll('.banniere-verte').forEach(banniere => {
      banniere.addEventListener('click', () => {
        document.getElementById('activites')?.scrollIntoView({behavior: 'smooth'});
      });
    });
  });
  </script>
</body>
</html>
